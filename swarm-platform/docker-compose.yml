services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: swarm
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
